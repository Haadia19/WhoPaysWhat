<header class="bg-white">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex py-2 items-center justify-between">
            <div class="flex-1 md:flex md:items-center md:gap-12">
                <a class="flex items-center gap-3 text-teal-600" href="#">
                    <img src="logo.png" alt="WhoPaysWhat logo" class="h-24 w-auto" />
                    <span class="text-3xl font-bold tracking-tight">whopayswhat</span>
                </a>
            </div>

            <div class="md:flex md:items-center md:gap-12">
                <nav aria-label="Global" class="hidden md:block">
                    <ul class="flex items-center gap-6 text-sm">
                        <li>
                            <a class="text-gray-500 transition hover:text-gray-500/75" routerLink="/bill"
                                routerLinkActive="active">
                                Bills
                            </a>
                        </li>
                    </ul>
                </nav>
                <div class="hidden md:flex items-center gap-4">
                    @if (authService.user$ | async) {
                    <!-- Logged in: show user email and logout -->
                    <span class="text-sm text-gray-600">{{ (authService.user$ | async)?.email }}</span>
                    <a (click)="logout()"
                        class="rounded-md bg-gray-100 px-5 py-2.5 text-sm font-medium text-red-600 cursor-pointer hover:bg-gray-200">
                        Logout
                    </a>
                    } @else {
                    <!-- Not logged in: show login and get started -->
                    @if (isHome()) {
                    <a class="rounded-md bg-teal-600 px-5 py-2.5 text-sm font-medium text-white shadow-sm"
                        routerLink="/login">
                        Login
                    </a>
                    <a class="rounded-md bg-gray-100 px-5 py-2.5 text-sm font-medium text-teal-600" routerLink="/bill">
                        Let's get started!
                    </a>
                    } @else {
                    <a class="rounded-md bg-teal-600 px-5 py-2.5 text-sm font-medium text-white shadow-sm"
                        routerLink="/login">
                        Login
                    </a>
                    }
                    }
                </div>
            </div>
        </div>
    </div>
</header>
<main>
    <router-outlet></router-outlet>
</main>
